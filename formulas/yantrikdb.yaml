name: yantrikdb-mcp
description: Persistent cognitive memory — recall/remember/graph/relate/correct across conversations. Hierarchical, embedding-backed, self-updating. stdio default, SSE/streamable-http for multi-client.
homepage: https://github.com/yantrikos/yantrikdb-mcp
tags: [memory, python, ai]

transport: stdio
runtime: python
package: yantrikdb-mcp
args: []

# Works offline out of the box — DB defaults to ~/.yantrikdb/memory.db.
# For multi-client shared memory, switch to SSE transport and share via Pier.
remote_eligible: true

secrets:
  - key: yantrikdb_api_key
    label: YantrikDB Bearer Token (only required for SSE / streamable-http)
    help: https://yantrikdb.com/guides/mcp/
    required: false
  - key: yantrikdb_db_path
    label: Database file path (default ~/.yantrikdb/memory.db)
    required: false

env:
  YANTRIKDB_API_KEY: "${yantrikdb_api_key}"
  YANTRIKDB_DB_PATH: "${yantrikdb_db_path}"
